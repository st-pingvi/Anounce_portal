constitution_id: cmd-content-quality-001
title: "Конституция контента ЦМД"
source_file: "/Users/johndoe/Downloads/2 этап (1).docx"
updated_at: 2026-03-20
checklist:
  - id: Q01
    question: "Есть ли реальный запрос от участников?"
    ok_example: "Опрос или кастдев выявил интерес к теме."
    stop_example: "Запроса не было или у аудитории был негативный опыт аналогичных мероприятий."
  - id: Q02
    question: "Соответствует ли формат месту проведения?"
    ok_example: "Кулинарный мастер-класс проводится на оборудованной кухне."
    stop_example: "Лекция проходит в помещении, не подходящем по типу активности."
  - id: Q03
    question: "Учитывает ли тема уровень развития аудитории?"
    ok_example: "Содержание соответствует опыту и запросу участников."
    stop_example: "Тема слишком базовая или слишком сложная для целевой группы."
  - id: Q04
    question: "Доступно ли мероприятие для всех желающих?"
    ok_example: "Формат открыт для посетителей центра."
    stop_example: "Сценарий создает закрытый эксклюзивный контур для ограниченного круга."
  - id: Q05
    question: "Борется ли проект за время участника с конкурентами?"
    ok_example: "Выбрано удобное окно календаря и понятный ценностный оффер."
    stop_example: "Мероприятие ставится в сезон, когда аудитория системно недоступна."
  - id: Q06
    question: "Соблюдены ли авторские права?"
    ok_example: "Используются лицензированные материалы и официальные сервисы."
    stop_example: "Контент показывается через личные аккаунты или без разрешений."
  - id: Q07
    question: "Безопасна ли тема для психологического климата?"
    ok_example: "Тема просветительская и не провоцирует конфликт."
    stop_example: "Тема вероятно вызовет жалобы, напряжение или раскол аудитории."
  - id: Q08
    question: "Соответствует ли площадь помещения количеству участников?"
    ok_example: "Площадка комфортно вмещает целевую группу."
    stop_example: "Количество участников превышает вместимость помещения."
  - id: Q09
    question: "Есть ли ресурсы у центра на проведение?"
    ok_example: "Есть спикер, партнер, оборудование или команда сопровождения."
    stop_example: "Не хватает бюджета, сотрудников или организационного ресурса."
  - id: Q10
    question: "Известны ли каналы привлечения участников?"
    ok_example: "Понятен путь аудитории через каналы ЦМД или естественный спрос."
    stop_example: "Посещаемость достигается только искусственным нагоном."
red_flags:
  - id: RF-01
    title: "Эйджизм и стереотипы"
    risk_description: "Отношение к участникам как к неподготовленным без учета их опыта."
  - id: RF-02
    title: "Бесполезный формат"
    risk_description: "Мероприятие держится на инерционном приглашении, а не на реальном интересе."
  - id: RF-03
    title: "Политика и религия"
    risk_description: "Тема может сформировать токсичный фон и конфликт."
  - id: RF-04
    title: "Исключение участников"
    risk_description: "Сценарий создает закрытую группу без притока новых участников."
  - id: RF-05
    title: "Прямая реклама"
    risk_description: "Коммерческая продажа маскируется под просветительский контент."
system_warning:
  title: "ВНИМАНИЕ: РИСК НИЗКОЙ ЭФФЕКТИВНОСТИ И КОНФЛИКТА"
  reasons:
    - "Перегрузка ресурсов центра и сотрудников."
    - "Риск токсичной среды и жалоб."
    - "Низкая ценность сценария при отсутствии спроса и понятных каналов набора."
  recommendation: "Проверьте физическую возможность центра и проведите опрос аудитории перед запуском."
