    title: "Запрет имитации"
    rule: "Блокировка лекций в пространствах, не подходящих формату."
  - id: VF-02
    title: "Проверка на эйджизм"
    rule: "При цифровой теме требуется уточнение уровня группы."
  - id: VF-03
    title: "Запрет исключения"
    rule: "Флагманские центры не могут проводить эксклюзивные сценарии для избранных."
  - id: VF-04
    title: "Авторское право"
    rule: "Показ фильмов требует подтвержденной лицензии."
