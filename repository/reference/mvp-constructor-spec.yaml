  - id: TC3
    title: "Нейросети для хакеров"
    type: adaptability
    expected_result: "Генерируется продвинутый контент без примитивных пояснений."
  - id: TC4
    title: "Клуб мастеров"
    type: paradigm_shift
    expected_result: "Лекция автоматически меняется на практикум."
  - id: TC5
    title: "Глухая имитация"
