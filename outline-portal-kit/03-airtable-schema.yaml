base_name: "Московское долголетие — Анонсы"
tables:
  - name: Events
    purpose: "Главная таблица событий"
    primary_field:
      name: Event Title
      type: singleLineText
    fields:
      - { name: Event ID, type: autonumber }
      - { name: Slug, type: formula, formula: "LOWER(SUBSTITUTE({Event Title}, ' ', '-'))" }
      - { name: Event Title, type: singleLineText }
      - { name: Short Announcement, type: multilineText, note: "AI-анонс до 200 символов" }
      - { name: Social Post Text, type: multilineText, note: "Текст для VK/Telegram до 200 символов" }
      - { name: Full Description, type: multilineText }
      - { name: Program Line, type: singleSelect, options: ["Здоровье", "Творчество", "Цифровая грамотность", "Спорт", "Досуг", "Семья"] }
      - { name: Event Format, type: singleSelect, options: ["Лекция", "Мастер-класс", "Концерт", "Практикум", "Экскурсия", "Клубная встреча", "Спорт", "Танцы", "Экскурсионная программа"] }
      - { name: Audience, type: multipleSelects, options: ["Сотрудники", "Участники 55+", "Семьи", "Новички", "Активные участники", "С внуками", "Партнеры", "Молодые специалисты"] }
      - { name: Venue, type: linkedRecord, table: Venues }
      - { name: District, type: linkedRecord, table: Districts }
      - { name: Start Datetime, type: dateTime }
      - { name: End Datetime, type: dateTime }
      - { name: Event Date Range, type: formula, formula: "DATETIME_FORMAT({Start Datetime}, 'DD.MM.YYYY HH:mm')" }
      - { name: Registration URL, type: url }
      - { name: Participation Details, type: singleLineText }
      - { name: Route URL, type: url }
      - { name: Yandex Maps URL, type: url }
      - { name: Google Calendar Event URL, type: url }
      - { name: Poster Status, type: singleSelect, options: ["Не создана", "В работе", "Готова", "Нужна замена"] }
      - { name: Poster URL, type: url }
      - { name: Canva Design URL, type: url }
      - { name: Poster PNG 1080x1920 URL, type: url }
      - { name: Outline Doc URL, type: url }
      - { name: Outline Doc ID, type: singleLineText }
      - { name: Publish Status, type: singleSelect, options: ["Черновик", "На проверке", "На модерации", "Готово к публикации", "Опубликовано", "Завершено", "Архив"] }
      - { name: Approval Status, type: singleSelect, options: ["Не отправлено", "Ожидает одобрения", "Одобрено", "Отклонено"] }
      - { name: Intake Source, type: singleSelect, options: ["Airtable Form", "Tally", "Manual", "Zapier"] }
      - { name: Created By Name, type: singleLineText }
      - { name: Created By Role, type: singleSelect, options: ["Управленческая команда", "Сотрудник ЦМД", "Территориальный управляющий", "Менеджер по партнерам", "Поставщик", "Лидер клуба", "Куратор молодых специалистов"] }
      - { name: Created By Login, type: singleLineText }
      - { name: Contact Name, type: singleLineText }
      - { name: Contact Phone, type: phoneNumber }
      - { name: Contact Email, type: email }
      - { name: AI Prompt Version, type: singleLineText }
      - { name: Last Published At, type: dateTime }
      - { name: Needs Editorial Review, type: checkbox }
      - { name: Search Keywords, type: multilineText }
      - { name: Attendance Count, type: number }
      - { name: Feedback Summary, type: multilineText }
      - { name: Post Event Photos URL, type: url }
      - { name: Report URL, type: url }
      - { name: VK Post URL, type: url }
      - { name: Telegram Post URL, type: url }
      - { name: after55 Export Status, type: singleSelect, options: ["Не отправлено", "Отправлено", "Ошибка"] }
  - name: Venues
    purpose: "Справочник площадок"
    primary_field:
      name: Venue Name
      type: singleLineText
    fields:
      - { name: Venue Name, type: singleLineText }
      - { name: Venue Code, type: singleLineText }
      - { name: District, type: linkedRecord, table: Districts }
      - { name: Address, type: multilineText }
      - { name: Capacity, type: number }
      - { name: Accessibility Notes, type: multilineText }
      - { name: Map URL, type: url }
      - { name: Yandex Maps Embed URL, type: url }
  - name: Districts
    purpose: "Районы и административные единицы"
    primary_field:
      name: District Name
      type: singleLineText
    fields:
      - { name: District Name, type: singleLineText }
      - { name: AO, type: singleLineText }
  - name: Poster Tasks
    purpose: "Производство афиш"
    primary_field:
      name: Task Name
      type: formula
      formula: "{Event} & ' / poster'"
    fields:
      - { name: Event, type: linkedRecord, table: Events }
      - { name: Canva Template ID, type: singleLineText }
      - { name: Draft URL, type: url }
      - { name: Export URL, type: url }
      - { name: Status, type: singleSelect, options: ["Новая", "Собрана", "Проверена", "Загружена"] }
      - { name: Visual Mode, type: singleSelect, options: ["Canva API", "Python Pillow"] }
      - { name: Brand Template Version, type: singleLineText }
  - name: Publication Log
    purpose: "История публикаций и изменений"
    primary_field:
      name: Log Title
      type: formula
      formula: "{Event} & ' / ' & DATETIME_FORMAT({Created At}, 'YYYY-MM-DD HH:mm')"
    fields:
      - { name: Event, type: linkedRecord, table: Events }
      - { name: Action, type: singleSelect, options: ["Created", "Updated", "Published", "Archived", "Poster Updated"] }
      - { name: Source, type: singleSelect, options: ["Zapier", "Editor", "API"] }
      - { name: Created At, type: createdTime }
  - name: Channel Deliveries
    purpose: "Статусы внешних публикаций"
    primary_field:
      name: Delivery Title
      type: formula
      formula: "{Event} & ' / ' & {Channel}"
    fields:
      - { name: Event, type: linkedRecord, table: Events }
      - { name: Channel, type: singleSelect, options: ["Outline", "Google Calendar", "VK", "Telegram", "after55.moscow"] }
      - { name: Status, type: singleSelect, options: ["В очереди", "Опубликовано", "Ошибка"] }
      - { name: Delivery URL, type: url }
      - { name: Error Message, type: multilineText }
views:
  - table: Events
    name: "К публикации"
    filter: "Publish Status = 'Готово к публикации'"
  - table: Events
    name: "Черновики с риском"
    filter: "Needs Editorial Review = 1"
  - table: Events
    name: "На модерации"
    filter: "Approval Status = 'Ожидает одобрения'"
  - table: Events
    name: "На эту неделю"
    filter: "Start Datetime is within next 7 days"
  - table: Events
    name: "Пост-ивент в работе"
    filter: "Publish Status = 'Опубликовано'"
  - table: Poster Tasks
    name: "Афиши в работе"
    filter: "Status != 'Загружена'"
forms:
  - name: "Подача события"
    table: Events
    fields:
      - Start Datetime
      - Event Title
      - Venue
      - Yandex Maps URL
      - Event Format
      - Full Description
      - Audience
      - Participation Details
      - Registration URL
      - Created By Name
      - Created By Role
      - Contact Phone
      - Contact Email
