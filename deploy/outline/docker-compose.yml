services:
  postgres:
    image: postgres:16
    container_name: portal-outline-postgres
    restart: unless-stopped
    env_file:
      - ./docker.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: portal-outline-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  outline:
    image: docker.getoutline.com/outlinewiki/outline:1.6.1
    container_name: portal-outline-app
    restart: unless-stopped
    env_file:
      - ./docker.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - outline_storage:/var/lib/outline/data

volumes:
  postgres_data:
  redis_data:
  outline_storage:
